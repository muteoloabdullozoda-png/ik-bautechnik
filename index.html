<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="IK Bautechnik"/>
<meta name="theme-color" content="#0a1628"/>
<title>IK Bautechnik GmbH</title>
<style>
:root{
  --bg:#0a1628;--bg2:#0f2040;--bg3:#162a4f;--border:#1e3a6e;
  --accent:#2563eb;--accent2:#3b82f6;--accent3:#60a5fa;
  --text:#e8f4fd;--text2:#93c5fd;--text3:#4a6a8a;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text)}
input,select,textarea,button{font-family:inherit}

#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:88px;height:88px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:18px;box-shadow:0 0 60px #3b82f655}
.splash-title{font-size:21px;font-weight:800;margin-bottom:5px}
.splash-sub{font-size:12px;color:var(--text2)}
.splash-bar{width:50px;height:3px;background:var(--border);border-radius:3px;margin-top:30px;overflow:hidden}
.splash-bar-inner{height:100%;background:var(--accent2);border-radius:3px;animation:load 2s ease forwards}
@keyframes load{from{width:0}to{width:100%}}

#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1d4ed833,var(--bg) 70%);padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 0 80px #1d4ed818}
.login-logo{width:68px;height:68px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:0 0 30px #3b82f640}
.login-title{font-size:19px;font-weight:800;margin-bottom:3px}
.login-sub{font-size:11px;color:var(--text3);margin-bottom:24px}
.lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.lfield{margin-bottom:13px;text-align:left}
.lfield label{font-size:10px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.lfield input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color 0.2s}
.lfield input:focus{border-color:var(--accent2)}
.login-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:5px;box-shadow:0 4px 20px #3b82f630}
.login-err{background:#ef444415;border:1px solid var(--red);color:var(--red);border-radius:9px;padding:9px;font-size:12px;margin-top:10px;display:none}

#app{display:none}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:200}
.hlogo{width:30px;height:30px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hname{font-weight:800;font-size:12px}
.hsub{font-size:9px;color:var(--text3)}
.sync-wrap{display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.ing{background:var(--yellow);animation:blink 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-lbl{font-size:10px;color:var(--text2)}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:11px}

.breadcrumb{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:6px 14px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-wrap:wrap;overflow-x:auto}
.breadcrumb a{color:var(--accent3);cursor:pointer}

.container{max-width:900px;margin:0 auto;padding:16px 12px}
.page{display:none}.page.active{display:block}

.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;z-index:999;display:none;box-shadow:0 4px 20px #0006;white-space:nowrap}
.toast.show{display:block}.toast.err{background:var(--red)}.toast.inf{background:var(--accent)}

.spinner-wrap{text-align:center;padding:40px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

.sec-title{font-size:19px;font-weight:800;margin-bottom:3px}
.sec-sub{font-size:12px;color:var(--text3);margin-bottom:18px}

.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px;margin-bottom:14px}
.city-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 12px;cursor:pointer;transition:all 0.2s;text-align:center}
.city-card:hover,.city-card:active{border-color:var(--accent2);box-shadow:0 4px 18px #3b82f620}
.city-icon{font-size:30px;margin-bottom:9px}
.city-name{font-weight:700;font-size:13px;margin-bottom:2px}
.city-count{font-size:10px;color:var(--text3)}
.add-city{background:transparent;border:2px dashed var(--border);border-radius:14px;padding:18px 12px;cursor:pointer;text-align:center;color:var(--text3);transition:all 0.2s}
.add-city:hover{border-color:var(--accent2);color:var(--accent3)}

.work-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.work-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 12px;cursor:pointer;transition:all 0.2s;text-align:center}
.work-card:hover{border-color:var(--accent2);transform:translateY(-1px)}
.work-icon{font-size:32px;margin-bottom:9px}
.work-name{font-weight:700;font-size:12px}

.day-list{display:flex;flex-direction:column;gap:9px}
.day-item{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s}
.day-item:hover{border-color:var(--accent2)}
.day-date{font-weight:700;font-size:14px}
.day-meta{font-size:10px;color:var(--text3);margin-top:2px}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.ffull{grid-column:1/-1}
.flabel{font-size:10px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
input[type=text],input[type=date],input[type=number],input[type=password],select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent2)}
textarea{resize:vertical}

.btn-p{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px #3b82f630}
.btn-s{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:9px;padding:9px 15px;font-size:12px;font-weight:600;cursor:pointer}
.btn-d{background:#ef444415;border:1px solid var(--red);color:var(--red);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
.btn-g{background:#10b98115;border:1px solid var(--green);color:var(--green);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
.btn-save{background:linear-gradient(135deg,#047857,#10b981);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px #10b98130}
.back-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:4px;padding:0}
.back-btn:hover{color:var(--accent3)}

.nv-block{background:var(--bg);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:12px}
.nv-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;gap:7px;flex-wrap:wrap}
.nv-title{font-weight:800;font-size:14px;color:var(--accent3)}
.nv-btns{display:flex;gap:5px;flex-shrink:0}

.addr-row{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 11px;margin-bottom:7px}
.addr-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.addr-num{width:24px;height:24px;background:var(--accent)20;color:var(--accent3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.srow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.sbtn{border:1px solid var(--border);background:transparent;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:600;color:var(--text3);transition:all 0.15s}
.sbtn.sd{background:#10b98115;border-color:var(--green);color:var(--green)}
.sbtn.sp{background:#f59e0b15;border-color:var(--yellow);color:var(--yellow)}
.sbtn.sn{background:#ef444415;border-color:var(--red);color:var(--red)}

.file-drop{border:2px dashed var(--border);border-radius:9px;padding:13px;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:7px}
.file-drop:hover{border-color:var(--accent2)}
.flist{display:flex;flex-direction:column;gap:5px}
.fitem{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 9px;display:flex;align-items:center;gap:7px;font-size:11px}
.fitem-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.fthumb{width:32px;height:32px;object-fit:cover;border-radius:5px;cursor:pointer;flex-shrink:0}

.entry-block{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:9px}
.entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.entry-title{font-weight:700;font-size:12px;color:var(--accent3)}

.modal-bg{position:fixed;inset:0;background:#000b;z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 18px 28px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:34px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-weight:800;font-size:15px;margin-bottom:16px}

.confirm-box{background:var(--bg2);border:1px solid var(--red);border-radius:15px;padding:22px;width:100%;max-width:320px;margin:auto}
.confirm-icon{font-size:36px;text-align:center;margin-bottom:10px}
.confirm-title{font-weight:800;font-size:15px;text-align:center;margin-bottom:5px}
.confirm-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:18px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;border:none}

.empty{text-align:center;padding:44px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}

.install-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.install-bar-text{flex:1;font-size:11px;color:var(--text2);line-height:1.5}
.install-bar-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:17px}

@media(min-width:560px){
  .modal-bg{align-items:center}
  .modal{border-radius:18px;max-height:90vh}
  .work-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">🏗</div>
  <div class="splash-title">IK Bautechnik GmbH</div>
  <div class="splash-sub">Glasfaser Infrastruktur</div>
  <div class="splash-bar"><div class="splash-bar-inner"></div></div>
</div>

<div class="toast" id="toast"></div>

<div id="login-page" style="display:none">
  <div class="login-box">
    <div class="login-logo">🏗</div>
    <div class="login-title">IK Bautechnik GmbH</div>
    <div class="login-sub">Glasfaser Infrastruktur Management</div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('de',this)">🇩🇪 DE</button>
      <button class="lang-btn" onclick="setLang('ru',this)">🇷🇺 RU</button>
    </div>
    <div class="lfield"><label id="ll-login">Benutzername</label><input type="text" id="il" placeholder="Login" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="lfield"><label id="ll-pass">Passwort</label><input type="password" id="ip" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" id="lb" onclick="doLogin()">Anmelden →</button>
    <div class="login-err" id="le"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="hlogo">🏗</div>
      <div><div class="hname">IK Bautechnik GmbH</div><div class="hsub">Glasfaser Management</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-wrap"><div class="sync-dot" id="sdot"></div><span class="sync-lbl" id="slbl"></span></div>
      <button class="logout-btn" id="btn-logout" onclick="doLogout()">Abmelden</button>
    </div>
  </div>
  <div class="breadcrumb" id="bc"></div>
  <div class="container">

    <div class="page active" id="page-cities">
      <div class="install-bar" id="ibar" style="display:none">
        <div style="font-size:22px">📱</div>
        <div class="install-bar-text" id="ibar-text"></div>
        <button class="install-bar-close" onclick="this.parentElement.style.display='none'">×</button>
      </div>
      <div class="sec-title" id="t-objects">Objekte</div>
      <div class="sec-sub" id="s-objects">Objekt auswählen</div>
      <div class="city-grid" id="city-grid"></div>
    </div>

    <div class="page" id="page-works">
      <button class="back-btn" id="b-works" onclick="goTo('cities')">← Zurück</button>
      <div class="sec-title" id="t-city"></div>
      <div class="sec-sub" id="s-worktype">Arbeitsart auswählen</div>
      <div class="work-grid">
        <div class="work-card" onclick="goWork('Hausanschluss')"><div class="work-icon">🏠</div><div class="work-name">Hausanschluss</div></div>
        <div class="work-card" onclick="goWork('Einblasen')"><div class="work-icon">💨</div><div class="work-name">Einblasen und Aktivieren</div></div>
        <div class="work-card" onclick="goWork('Tiefbau')"><div class="work-icon">🚜</div><div class="work-name">Tiefbau</div></div>
        <div class="work-card" onclick="goWork('HK')"><div class="work-icon">🔌</div><div class="work-name">HK Einblasen</div></div>
      </div>
    </div>

    <div class="page" id="page-days">
      <button class="back-btn" id="b-days">← Zurück</button>
      <div class="sec-title" id="t-days"></div>
      <div class="sec-sub" id="s-days"></div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn-p" id="btn-newday" onclick="openDayModal()">+ Neuer Tag</button>
      </div>
      <div id="day-list" class="day-list"></div>
    </div>

    <div class="page" id="page-einblasen">
      <button class="back-btn" id="b-eb">← Zurück</button>
      <div class="sec-title" id="t-eb"></div>
      <div class="sec-sub" id="s-eb"></div>
      <div style="display:flex;gap:7px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn-save" id="btn-seb" onclick="saveEB()">💾 Speichern</button>
        <button class="btn-p" id="btn-anv" onclick="addNV()">+ Netzverteiler</button>
      </div>
      <div id="nv-list"></div>
    </div>

    <div class="page" id="page-generic">
      <button class="back-btn" id="b-gen">← Zurück</button>
      <div class="sec-title" id="t-gen"></div>
      <div class="sec-sub" id="s-gen"></div>
      <div style="display:flex;gap:7px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn-save" id="btn-sgen" onclick="saveGEN()">💾 Speichern</button>
        <button class="btn-p" id="btn-aen" onclick="addEntry()">+ Eintrag</button>
      </div>
      <div id="gen-list"></div>
    </div>

  </div>
</div>

<!-- Modal: City -->
<div class="modal-bg" id="m-city">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mt-city">🏙 Neues Objekt</div>
    <div style="margin-bottom:12px"><label class="flabel" id="ml-city">Objektname</label><input type="text" id="new-city" placeholder="z.B. Frankfurt"/></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-s" onclick="closeM('m-city')" id="ml-cancel">Abbrechen</button>
      <button class="btn-p" onclick="saveCity()" id="ml-add">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Modal: Day -->
<div class="modal-bg" id="m-day">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mt-day">📅 Neuer Arbeitstag</div>
    <div style="margin-bottom:12px"><label class="flabel" id="ml-date">Datum</label><input type="date" id="new-date"/></div>
    <div style="margin-bottom:12px"><label class="flabel" id="ml-comment">Kommentar (optional)</label><textarea id="new-comment" rows="3"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-s" onclick="closeM('m-day')">Abbrechen</button>
      <button class="btn-p" onclick="saveDay()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm -->
<div class="modal-bg" id="m-confirm" style="align-items:center;padding:16px">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title" id="ct"></div>
    <div class="confirm-sub" id="cs"></div>
    <div class="confirm-btns">
      <button style="background:var(--bg3);color:var(--text)" onclick="closeM('m-confirm')" id="cn">Nein</button>
      <button style="background:var(--red);color:#fff" id="cy">Ja, löschen</button>
    </div>
  </div>
</div>

function t(k){ return TR[LANG][k]||k; }

// ===== SUPABASE =====
async function sbGet(){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/ikbt_data?select=*&limit=1`,{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"}
    });
    const rows = await r.json();
    if(rows && rows.length>0){
      dbRowId = rows[0].id;
      const parsed = JSON.parse(rows[0].data);
      if(parsed.cities) DB.cities = parsed.cities;
      if(parsed.records) DB.records = parsed.records;
      localStorage.setItem("ik_db", rows[0].data);
      return true;
    }
    return false;
  }catch(e){
    const local = localStorage.getItem("ik_db");
    if(local){ try{ const p=JSON.parse(local); if(p.cities)DB.cities=p.cities; if(p.records)DB.records=p.records; }catch{} }
    return false;
  }
}

async function sbSave(){
  setSyncStatus("ing");
  const payload = JSON.stringify({cities:DB.cities, records:stripFiles(DB.records)});
  localStorage.setItem("ik_db", JSON.stringify({cities:DB.cities,records:DB.records}));
  try{
    let r;
    if(dbRowId){
      r = await fetch(`${SB_URL}/rest/v1/ikbt_data?id=eq.${dbRowId}`,{
        method:"PATCH",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
        body:JSON.stringify({data:payload})
      });
    } else {
      r = await fetch(`${SB_URL}/rest/v1/ikbt_data`,{
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},
        body:JSON.stringify({data:payload})
      });
      if(r.ok){ const rows=await r.json(); if(rows&&rows[0]) dbRowId=rows[0].id; }
    }
    setSyncStatus("ok");
    toast(t("saved"));
  }catch(e){
    setSyncStatus("err");
    toast("Sync-Fehler!","err");
  }
}

function stripFiles(records){
  // Store file metadata only in supabase, full data in localStorage
  const r = JSON.parse(JSON.stringify(records));
  Object.values(r).forEach(works=>{
    Object.values(works).forEach(days=>{
      Object.values(days).forEach(day=>{
        (day.nvs||[]).forEach(nv=>{
          (nv.addresses||[]).forEach(addr=>{
            (addr.files||[]).forEach(f=>{ if(f.data&&f.data.length>100) f.data="[файл сохранён локально]"; });
          });
        });
        (day.entries||[]).forEach(en=>{
          (en.files||[]).forEach(f=>{ if(f.data&&f.data.length>100) f.data="[файл сохранён локально]"; });
        });
      });
    });
  });
  return r;
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ localStorage.setItem("ik_db",JSON.stringify({cities:DB.cities,records:DB.records})); },300);
}

}

function saveDay(){
  const date=document.getElementById("new-date").value;

  closeM("m-day");

function renderAddr(ni,ai,addr){

    <div class="addr-top">

    <div class="flist">${files}</div>
  </div>`;
}

function addNV(){ const d=getDay(); d.nvs.push({number:"",addresses:[]}); scheduleSave(); renderNVs(); }
function removeNV(ni){ getDay().nvs.splice(ni,1); scheduleSave(); renderNVs(); }
function updNV(ni,k,v){ getDay().nvs[ni][k]=v; scheduleSave(); }
function addAddr(ni){ getDay().nvs[ni].addresses.push({street:"",status:null,comment:"",files:[]}); scheduleSave(); renderNVs(); }
function rmAddr(ni,ai){ getDay().nvs[ni].addresses.splice(ai,1); scheduleSave(); renderNVs(); }
function updAddr(ni,ai,k,v){ getDay().nvs[ni].addresses[ai][k]=v; scheduleSave(); }
function setStatus(ni,ai,s){ getDay().nvs[ni].addresses[ai].status=s; scheduleSave(); renderNVs(); }
function handleFiles(e,ni,ai){
  Array.from(e.target.files).forEach(file=>{
    const isImg=file.type.startsWith("image/"),isPDF=file.type==="application/pdf";
    if(!isImg&&!isPDF){toast(t("addFile"),"err");return;}
    const r=new FileReader();
    r.onload=ev=>{ getDay().nvs[ni].addresses[ai].files.push({name:file.name,data:ev.target.result,type:isImg?"image":"pdf"}); scheduleSave(); renderNVs(); };
    r.readAsDataURL(file);
  });
}
function rmFile(ni,ai,fi){ getDay().nvs[ni].addresses[ai].files.splice(fi,1); scheduleSave(); renderNVs(); }

// ===== HELPERS =====
function getDay(){ return DB.records[S.city][S.work][S.day]; }
function fmtD(d){ try{return new Date(d+"T00:00:00").toLocaleDateString(LANG==="de"?"de-DE":"ru-RU",{day:"2-digit",month:"2-digit",year:"numeric"});}catch{return d;} }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(msg,type="ok"){ const t2=document.getElementById("toast"); t2.textContent=msg; t2.className="toast show"+(type==="err"?" err":type==="inf"?" inf":""); clearTimeout(t2._t); t2._t=setTimeout(()=>t2.className="toast",2500); }
function openM(id){ document.getElementById(id).classList.add("show"); }
function closeM(id){ document.getElementById(id).classList.remove("show"); }
function confirmDel(fn){ delFn=fn; openM("m-confirm"); document.getElementById("cy").onclick=()=>{ if(delFn)delFn(); closeM("m-confirm"); delFn=null; }; }
function viewImg(src){ const d=document.createElement("div"); d.style.cssText="position:fixed;inset:0;background:#000d;z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer"; d.onclick=()=>d.remove(); d.innerHTML=`<img src="${src}" style="max-width:95vw;max-height:90vh;border-radius:12px"/>`; document.body.appendChild(d); }
function showInstallBar(){ const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase()); if(isIOS&&!window.navigator.standalone&&!localStorage.getItem("ik_ibclosed")){ const b=document.getElementById("ibar"); if(b)b.style.display="flex"; } }
document.querySelectorAll(".modal-bg").forEach(m=>m.addEventListener("click",function(e){if(e.target===this)this.classList.remove("show");}));

// ===== INIT =====
window.addEventListener("load",()=>{
  LANG=localStorage.getItem("ik_lang")||"de";
  document.querySelectorAll(".lang-btn").forEach(b=>{ b.classList.toggle("active",b.textContent.includes(LANG.toUpperCase())); });
  applyLang();
  setTimeout(()=>{
    document.getElementById("splash").classList.add("hide");
    setTimeout(()=>{
      document.getElementById("splash").style.display="none";
      if(localStorage.getItem("ik_sess")==="1"){
        document.getElementById("login-page").style.display="none";
        document.getElementById("app").style.display="block";
        initApp();
      } else {
        document.getElementById("login-page").style.display="flex";
      }
    },500);
  },2000);
});
</script>
</body>
</html>
